apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-data-plane
  namespace: argocd
spec:
  # The project the application belongs to.
  project: default

  # Source of the application manifests
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/local/data-plane.git
    targetRevision: 'main' #Should be based on environment
    path: '99-deployments/applications'

  # Destination cluster and namespace to deploy the application
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      selfHeal: true
      prune: false

